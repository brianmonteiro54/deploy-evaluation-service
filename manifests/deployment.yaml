apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: togglemaster-evaluation
  labels:
    app.kubernetes.io/name: evaluation-service
    app.kubernetes.io/component: evaluation
    app.kubernetes.io/part-of: togglemaster
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: evaluation-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evaluation-service
        app.kubernetes.io/component: evaluation
        app.kubernetes.io/part-of: togglemaster
    spec:
      initContainers:
        - name: build-redis-url
          image: python:3.12-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              python3 << 'EOF'
              import urllib.parse
              import os

              redis_url_base = os.environ.get('REDIS_URL_BASE', '')
              redis_password = os.environ.get('REDIS_PASSWORD', '')

              if redis_password:
                  encoded_password = urllib.parse.quote(redis_password, safe='')
                  if '://' in redis_url_base:
                      parts = redis_url_base.split('://', 1)
                      protocol = parts[0]
                      rest = parts[1]
                      redis_url = f"{protocol}//:{encoded_password}@{rest}"
                  else:
                      redis_url = redis_url_base
              else:
                  redis_url = redis_url_base

              with open('/shared/redis_url', 'w') as f:
                  f.write(redis_url)

              print("REDIS_URL configurada com sucesso")
              EOF
          env:
            - name: REDIS_URL_BASE
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-config
                  key: REDIS_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-config
                  key: REDIS_PASSWORD
                  optional: true
          volumeMounts:
            - name: shared-data
              mountPath: /shared

      containers:
        - name: evaluation-service
          image: 420414435435.dkr.ecr.us-east-1.amazonaws.com/togglemaster/evaluation-service:44df197fef483a0a9e0ea0a4a739d8e55163268a
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8004
              protocol: TCP
          command: ["/bin/sh", "-c"]
          args:
            - |
              export REDIS_URL=$(cat /shared/redis_url)
              exec /app/evaluation-service
          env:
            - name: PORT
              value: "8004"
            - name: APP_ENV
              value: "production"
            - name: FLAG_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-config
                  key: FLAG_SERVICE_URL
            - name: TARGETING_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-config
                  key: TARGETING_SERVICE_URL
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_SQS_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-config
                  key: SQS_QUEUE_URL
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-config
                  key: SERVICE_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-access-key
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: session-token
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: shared-data
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: evaluation-service
      terminationGracePeriodSeconds: 30
      restartPolicy: Always